name: .NET CI

on:
  push:
    branches: [ gha-ci-dotnet-test ]
  pull_request:
    branches: [development]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies (solution)
        run: dotnet restore ./ScrumPilot.slnx
      - name: Build (solution)
        run: dotnet build ./ScrumPilot.slnx --no-restore --configuration Release
      - name: Test (unit project)
        run: dotnet test ./ScrumPilot.UnitTests/ScrumPilot.UnitTests.csproj --no-build --configuration Release --verbosity normal