name: .NET CI

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches: [development]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./ScrumPilot.slnx
      - name: Restore dependencies (unit tests)
        run: dotnet restore ./ScrumPilot.UnitTests/ScrumPilot.UnitTests.csproj
      - name: Build
        run: dotnet build ./ScrumPilot.slnx --no-restore --configuration Release

      - name: Format / Lint check
        run: dotnet format ./ScrumPilot.slnx --verify-no-changes

      - name: Test (Unit Tests)
        run: dotnet test ./ScrumPilot.UnitTests/ScrumPilot.UnitTests.csproj --no-build --configuration Release --logger trx --results-directory ./TestResults

      - name: Publish API
        run: dotnet publish ./ScrumPilot.API/ScrumPilot.API.csproj --no-build --configuration Release --output ./publish/api

      - name: Publish Web
        run: dotnet publish ./ScrumPilot.Web/ScrumPilot.Web.csproj --no-build --configuration Release --output ./publish/web

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

      - name: Upload published artifacts
        uses: actions/upload-artifact@v4
        with:
          name: published-artifacts
          path: ./publish/

