name: Build, Push & Deploy

on:
  push:
    branches:
      - development
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA version tag
        id: version
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ScrumPilot.API/Dockerfile
          push: true
          tags: |
            jamesmd1996/scrumpilot-api:${{ steps.version.outputs.TAG }}
            jamesmd1996/scrumpilot-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ScrumPilot.Web/Dockerfile
          push: true
          build-args: |
            API_BASE_URL=${{ secrets.RENDER_API_BASE_URL }}
          tags: |
            jamesmd1996/scrumpilot-web:${{ steps.version.outputs.TAG }}
            jamesmd1996/scrumpilot-web:latest

      - name: Trigger Render API deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Trigger Render Web deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
