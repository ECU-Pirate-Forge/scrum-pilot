server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly, fallback to index.html for SPA client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Ensure framework assets are served as static files
    location /_framework/ {
        try_files $uri =404;
    }

    # Static asset caching for common extensions
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf|eot|map|wasm|br|gz)$ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    include /etc/nginx/mime.types;
}
